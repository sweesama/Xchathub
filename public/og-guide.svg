<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#000"/>

  <defs>
    <radialGradient id="glowG" cx="600" cy="280" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBarG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1d9bf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1d9bf0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glowG)"/>

  <!-- 顶部书本 icon + GUIDE 标签 -->
  <rect x="500" y="92" width="200" height="32" rx="16" fill="rgba(29,155,240,0.10)" stroke="rgba(29,155,240,0.30)" stroke-width="1"/>
  <g transform="translate(522,100)" stroke="#1d9bf0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h7a3 3 0 0 1 3 3v9a2 2 0 0 0-2-2H2z"/>
    <path d="M14 3h-3a3 3 0 0 0-3 3v9a2 2 0 0 1 2-2h4z" transform="translate(7,0)"/>
  </g>
  <text x="610" y="115" text-anchor="middle" fill="#1d9bf0" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="2">XCHAT GUIDE</text>

  <!-- 主标题（白） -->
  <text x="600" y="240" text-anchor="middle" fill="#e7e9ea" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="800" letter-spacing="-3">
    Verified, current
  </text>
  <text x="600" y="320" text-anchor="middle" fill="#e7e9ea" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="800" letter-spacing="-3">
    XChat <tspan fill="#1d9bf0">how-tos</tspan>
  </text>

  <!-- 副标题 -->
  <text x="600" y="385" text-anchor="middle" fill="#8b8d90" font-family="system-ui, sans-serif" font-size="24" font-weight="400">
    Tutorials, troubleshooting and FAQs from the XChat Hub
  </text>

  <!-- 分隔条 -->
  <rect x="300" y="430" width="600" height="1" fill="url(#accentBarG)"/>

  <!-- 三个 chip 提示 guide 题材 -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="13" font-weight="700" letter-spacing="1">
    <rect x="395" y="465" width="120" height="34" rx="17" fill="rgba(29,155,240,0.06)" stroke="#222" stroke-width="1"/>
    <text x="455" y="487" text-anchor="middle" fill="#8b8d90">CREATE</text>

    <rect x="540" y="465" width="120" height="34" rx="17" fill="rgba(29,155,240,0.06)" stroke="#222" stroke-width="1"/>
    <text x="600" y="487" text-anchor="middle" fill="#8b8d90">JOIN</text>

    <rect x="685" y="465" width="120" height="34" rx="17" fill="rgba(29,155,240,0.06)" stroke="#222" stroke-width="1"/>
    <text x="745" y="487" text-anchor="middle" fill="#8b8d90">EXPLAIN</text>
  </g>

  <!-- 底部域名 -->
  <text x="600" y="555" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="17" font-weight="500" letter-spacing="2">xchat.directory</text>
</svg>
