<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 黑色底 -->
  <rect width="1200" height="630" fill="#000"/>

  <!-- 蓝色径向光晕 -->
  <defs>
    <radialGradient id="glow" cx="600" cy="280" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1d9bf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1d9bf0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 顶部 LIVE 状态条 -->
  <rect x="500" y="92" width="200" height="32" rx="16" fill="rgba(0,186,124,0.08)" stroke="rgba(0,186,124,0.25)" stroke-width="1"/>
  <circle cx="525" cy="108" r="5" fill="#00ba7c"/>
  <circle cx="525" cy="108" r="9" fill="#00ba7c" fill-opacity="0.25"/>
  <text x="608" y="115" text-anchor="middle" fill="#00ba7c" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="2">XCHAT IS LIVE ON iOS</text>

  <!-- 主标题 -->
  <text x="600" y="220" text-anchor="middle" fill="#e7e9ea" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" letter-spacing="-3">
    The XChat Hub
  </text>

  <!-- 副标题 -->
  <text x="600" y="278" text-anchor="middle" fill="#8b8d90" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400">
    Public group directory · Web access · Android tracker
  </text>

  <!-- 渐变分隔条 -->
  <rect x="300" y="330" width="600" height="1" fill="url(#accentBar)"/>

  <!-- 三个核心数字 -->
  <text x="370" y="408" text-anchor="middle" fill="#e7e9ea" font-family="ui-monospace, 'SF Mono', monospace" font-size="46" font-weight="800">1,000</text>
  <text x="370" y="438" text-anchor="middle" fill="#56585c" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">MEMBERS / GROUP</text>

  <line x1="495" y1="380" x2="495" y2="445" stroke="#222" stroke-width="1"/>

  <text x="600" y="408" text-anchor="middle" fill="#1d9bf0" font-family="ui-monospace, 'SF Mono', monospace" font-size="46" font-weight="800">E2E</text>
  <text x="600" y="438" text-anchor="middle" fill="#56585c" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">ENCRYPTED</text>

  <line x1="705" y1="380" x2="705" y2="445" stroke="#222" stroke-width="1"/>

  <text x="830" y="408" text-anchor="middle" fill="#e7e9ea" font-family="ui-monospace, 'SF Mono', monospace" font-size="46" font-weight="800">0</text>
  <text x="830" y="438" text-anchor="middle" fill="#56585c" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">ADS · TRACKING</text>

  <!-- 底部 -->
  <text x="600" y="555" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="17" font-weight="500" letter-spacing="2">xchat.directory</text>
</svg>
