<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#000"/>

  <defs>
    <radialGradient id="glow2" cx="600" cy="280" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1d9bf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1d9bf0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 标签 -->
  <rect x="475" y="92" width="250" height="32" rx="16" fill="rgba(29,155,240,0.10)" stroke="rgba(29,155,240,0.30)" stroke-width="1"/>
  <text x="600" y="115" text-anchor="middle" fill="#1d9bf0" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="2">PUBLIC GROUPS DIRECTORY</text>

  <!-- 主标题 -->
  <text x="600" y="225" text-anchor="middle" fill="#e7e9ea" font-family="system-ui, -apple-system, sans-serif" font-size="78" font-weight="800" letter-spacing="-3">
