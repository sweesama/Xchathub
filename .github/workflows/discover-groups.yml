name: Discover XChat Groups

# 定时任务：每月 1 号 00:00 UTC 跑一次（X 搜索产出低，月频足够）
# 也可以手动触发 (workflow_dispatch)
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    # 必须声明写权限，才能让 peter-evans/create-pull-request 创建分支 + PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run discovery
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          DISCOVERY_OUTPUT: reports/discovered-groups.json
        run: node scripts/discover-groups.mjs

      - name: Check findings
        id: findings
        run: |
          if [ ! -f reports/discovered-groups.json ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No report produced"
            exit 0
          fi
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('reports/discovered-groups.json','utf8')).totalFound || 0)")
          echo "Found $COUNT new candidate links"
          head -c 3000 reports/discovered-groups.json
          if [ "$COUNT" -gt 0 ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.findings.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: monthly group discovery report'
          title: '[auto] Monthly XChat group discovery'
          body: |
            ## Automated group discovery report

            This PR is generated by `.github/workflows/discover-groups.yml`.

            **Review steps:**
            1. Open `discovered-groups.json` and inspect every item.
            2. For each legitimate group, run locally:
               ```
               npm run group:add -- --name "..." --category "..." --url "https://x.com/i/chat/group_join/..."
               ```
            3. Close this PR (do NOT merge the report into main).

            Keep `reports/discovered-groups.json` out of `main` — it's an ephemeral artifact.
          branch: auto/discover-groups
          delete-branch: true
          add-paths: |
            reports/discovered-groups.json
