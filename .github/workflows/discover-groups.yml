name: Discover XChat Groups

# 定时任务：每周一 00:00 UTC 跑一次，抓 X 上公开的 XChat 群邀请链接
# 也可以手动触发 (workflow_dispatch)
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    # 必须声明写权限，才能让 peter-evans/create-pull-request 创建分支 + PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run discovery
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          DISCOVERY_OUTPUT: reports/discovered-groups.json
        run: node scripts/discover-groups.mjs

      - name: Show findings
        if: always()
        run: |
          if [ -f reports/discovered-groups.json ]; then
            echo "=== Discovered groups ==="
            head -c 5000 reports/discovered-groups.json
          else
            echo "No report produced"
          fi

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: weekly group discovery report'
          title: '[auto] Weekly XChat group discovery'
          body: |
            ## Automated group discovery report

            This PR is generated by `.github/workflows/discover-groups.yml`.

            **Review steps:**
            1. Open `discovered-groups.json` and inspect every item.
            2. For each legitimate group, run locally:
               ```
               npm run group:add -- --name "..." --category "..." --url "https://x.com/i/chat/group_join/..."
               ```
            3. Close this PR (do NOT merge the report into main).

            Keep `reports/discovered-groups.json` out of `main` — it's an ephemeral artifact.
          branch: auto/discover-groups
          delete-branch: true
          add-paths: |
            reports/discovered-groups.json
